version: 2

project_name: loopctl

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: loopctl
    main: ./cmd/loopctl
    binary: loopctl
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/loop-eng/loopctl/internal/cli.version={{.Version}}
      - -X github.com/loop-eng/loopctl/internal/cli.commit={{.Commit}}
      - -X github.com/loop-eng/loopctl/internal/cli.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: loop-eng
      name: homebrew-tap
    homepage: https://github.com/loop-eng/loopctl
    description: "htop for AI coding agents — live terminal dashboard"
    license: MIT
    install: |
      bin.install "loopctl"
    test: |
      system "#{bin}/loopctl", "--version"
